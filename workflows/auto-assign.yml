name: Auto-assign Lombardoh

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  ok:
    runs-on: ubuntu-latest
    steps:
      - run: echo "repo=$GITHUB_REPOSITORY event=$GITHUB_EVENT_NAME sha=$GITHUB_SHA"
  assign-self:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              assignees: ["Lombardoh"]
            })
